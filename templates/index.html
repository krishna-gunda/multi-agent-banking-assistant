<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>
        Future Trust Bank
    </title>

    <link rel="stylesheet"
          href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="main-container">

    <div class="header">

        <div>
            <h1>
                Future Trust Bank
            </h1>

            <h3>
                Multi Department AI Assistant
            </h3>
        </div>

        <div class="status">

            <span>AI Online</span>

        </div>

    </div>

    <div class="stats">

        <div class="stat-card">
            <h2>24x7</h2>
            <p>Support</p>
        </div>

        <div class="stat-card">
            <h2>7</h2>
            <p>Departments</p>
        </div>

        <div class="stat-card">
            <h2>500+</h2>
            <p>Customers Daily</p>
        </div>

        <div class="stat-card">
            <h2>AI</h2>
            <p>Powered Support</p>
        </div>

    </div>

    <form method="POST">

        <h2 class="section-title">

            Select Department

        </h2>

        <div class="department-grid">

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Account_Opening">

                <span>Account_Opening</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Credit_Card">

                <span>Credit_Card</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="CSD">

                <span>CSD</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="FraudDetection">

                <span>FraudDetection</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Insurance">

                <span> Insurance</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Loan">

                <span> Loan</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Reception">

                <span>Reception</span>
            </label>

        </div>

        <textarea
        name="question"
        placeholder="Ask anything about Bank services..."
        required></textarea>

        <button type="submit">

            Ask AI Assistant

        </button>

    </form>

    {% if answer %}

    <div class="response-card">

        <h2>
            AI Response
        </h2>

        <p>
            {{answer}}
        </p>

    </div>

    {% endif %}

</div>

</body>

</html>
